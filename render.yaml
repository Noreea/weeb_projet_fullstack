services:
  - type: web
    name: weeb-api
    env: python
    region: frankfurt
    rootDir: backend/weeb_api
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn weeb_api.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: weeb_api.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: weeb-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: weeb-api-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://weeb-projet-fullstack.vercel.app
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: weeb-db
    databaseName: weeb_db
    user: weeb_user
    region: frankfurt
    plan: free
